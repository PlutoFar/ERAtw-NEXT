name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Windows：完整验证（Rust 工作区 + 前端 + 构建）。
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Rust fmt
        run: cargo fmt --check

      - name: Rust tests (workspace)
        run: cargo test --workspace

      - name: npm install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - name: Diff check
        run: git diff --check

  # Ubuntu：仅跑非桌面测试，避免引入 Linux Tauri 系统依赖。
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Rust fmt
        run: cargo fmt --check

      - name: Non-desktop Rust tests
        run: cargo test -p eratw_next_engine -p eratw_next_content_audit

      - name: npm install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Frontend tests
        run: npm test
